<!doctype html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mino</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='13' font-size='13'>&#129302;</text></svg>">
<link rel="stylesheet" href="/static/style.css"></head><body class="app-shell">
<nav id="nav">
  <div class="brand">
    <span class="brand-mark" aria-hidden="true"><svg viewBox="0 0 32 32"><circle cx="16" cy="16" r="12"/><circle cx="12" cy="14" r="1.8"/><circle cx="20" cy="14" r="1.8"/><path d="M11 19q5 5 10 0"/></svg></span>
    <span class="brand-copy"><b>Mino</b><small id="model"></small></span>
    <button id="nav-toggle" title="Hide sidebar">&#10094;</button></div>
  <div class="nav-label">Workspace</div>
  <a href="#overview" data-v="overview" data-icon="⌂"><span class="nav-text">Overview</span></a>
  <a href="#gateway" data-v="gateway" data-icon="↔"><span class="nav-text">Gateway</span><span class="n" id="n-gw"></span></a>
  <a href="#loop" data-v="loop" data-icon="◌"><span class="nav-text">Loop</span><span class="n" id="n-loop"></span></a>
  <a href="#memory" data-v="memory" data-icon="✦"><span class="nav-text">Memory</span><span class="n" id="n-mem"></span></a>
  <a href="#tools" data-v="tools" data-icon="⌘"><span class="nav-text">Tools</span><span class="n" id="n-tools"></span></a>
  <a href="#files" data-v="files" data-icon="▤"><span class="nav-text">Files</span></a>
  <div class="nav-label nav-label-secondary">System</div>
  <a href="#database" data-v="database" data-icon="▦"><span class="nav-text">Database</span><span class="n" id="n-db"></span></a>
  <a href="#ops" data-v="ops" data-icon="⌁"><span class="nav-text">Ops</span><span class="n" id="n-ops"></span></a>
  <a href="#settings" data-v="settings" data-icon="⚙"><span class="nav-text">Settings</span></a>
  <a href="#activetasks" data-v="activetasks" data-icon="✓"><span class="nav-text">Active Tasks</span></a>
  <div class="nav-foot"><span class="nav-pulse"></span><span>Core online</span><small>SQLite · local state</small></div>
</nav>
<div class="resizer" id="nav-resizer" title="Drag to resize sidebar"></div>
<main>
  <header class="pagehead">
    <div class="pagehead-top"><div><div class="eyebrow">MINO COMMAND CENTER</div><h1 id="title">Overview</h1></div>
      <div class="shell-status"><span class="status-dot"></span><span>Operational</span><span class="status-sep">·</span><span id="shell-clock">Live</span></div></div>
    <div class="sub" id="sub"></div>
  </header>
  <div id="view"></div>
</main>
<div class="resizer" id="dock-resizer" title="Drag to resize chat"></div>
<aside id="dock">
  <div class="dockhead">
    <span class="dt">Chat</span>
    <span class="arch-status"></span>
    <button id="dock-close" title="Collapse chat">&rsaquo;</button>
  </div>
  <div class="sesshead" style="padding:8px 2px 0">
    <button class="sessbtn" onclick="newChat()">+ New chat</button>
    <button class="sessbtn" onclick="toggleSessMenu(event)">History &#9662;</button>
  </div>
  <div class="chatlog" id="docklog"></div>
  <div class="chatbar">
    <input id="dmsg" placeholder="Message Mino&hellip;" autocomplete="off">
    <button id="mic" title="Click to talk — local Whisper, no cloud"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg></button>
    <button id="dsend">Send</button>
  </div>
</aside>
<button id="nav-reopen" title="Show sidebar">&#9776;</button>
<button id="dock-reopen" title="Open chat">&lsaquo; Chat</button>
<script src="/static/app.js"></script></body></html>
